name: Claude Code

# Responds to "@claude" mentions in issues, pull requests and review comments.
#
# Requires an `ANTHROPIC_API_KEY` repository secret. See:
# https://docs.anthropic.com/en/docs/claude-code

permissions:
  contents: read

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    name: Run Claude Code
    # Only run when "@claude" is mentioned.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Claude Code
        uses: pleaseai/setup-claude-code@a584779d3e6ee20cf6246a0ba4dcc2672a97ca2a # v1.1.4
        with:
          version: stable

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # The triggering text. Passed via env (not inline) to avoid script injection.
          PROMPT: ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}
        run: |
          claude -p "$PROMPT" --output-format text | tee claude-response.txt

      - name: Post Claude's response
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body-file claude-response.txt
